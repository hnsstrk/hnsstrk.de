baseURL = "https://hnsstrk.de/"
languageCode = "de"
defaultContentLanguage = "de"
title = "Hans Jürgen Stark"
enableRobotsTXT = true
enableGitInfo = true
theme = "hnsstrk"

# Sitemap-Konfiguration
[sitemap]
  changefreq = "monthly"
  priority = 0.5

# Parameter (Theme-Konfiguration)
[params]
  description = "Persönliche Profilseite von Hans Jürgen Stark — Developer, Maker, Gamer"
  author = "Hans Jürgen Stark"
  email = "hans.juergen.stark@gmail.com"

  # SEO
  ogImage = "images/og-default.png"

  # Theme
  defaultTheme = "light"  # light | mirage | dark

  # Blog — Vorschaubild-Layout in der Blog-Übersicht (/blog/)
  # Globaler Standard. Pro Beitrag überschreibbar im Frontmatter:
  #
  #   featured_image: "dateiname.png"
  #   featured_layout: "left"
  #
  # Verfügbare Layouts:
  #   "left"   — Thumbnail links, Text rechts (empfohlen: quadratisch, z.B. 600x600)
  #   "right"  — Thumbnail rechts, Text links (empfohlen: quadratisch, z.B. 600x600)
  #   "top"    — Bild oben, volle Breite (empfohlen: breit, z.B. 1200x400)
  #   "bottom" — Bild unten, volle Breite (empfohlen: breit, z.B. 1200x400)
  featuredLayout = "left"

  # Footer
  tagline = "Notizen aus der Bastelstube — über KI-Tools, Self-Hosting, lokale LLMs und andere technische Themen."
  logoPrompt = ">"
  copyright = "CC BY 4.0 Hans Jürgen Stark"

  # Social Links (erscheinen im Footer unter "Anderswo")
  [params.social]
    github = "hnsstrk"
    mastodon = "@hnsstrk"
    email = "hans.juergen.stark@gmail.com"

# Markup
[markup.goldmark.renderer]
  unsafe = false

[markup.goldmark.extensions.typographer]
  disable = true

[markup.goldmark.parser.attribute]
  block = true

[markup.highlight]
  noClasses = false
  lineNos = false

# Taxonomies
[taxonomies]
  tag = "tags"

# Menus
[menus]
  [[menus.main]]
    name = "Über mich"
    url = "/about/"
    weight = 10
  [[menus.main]]
    name = "Projekte"
    url = "/projects/"
    weight = 20
  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 25
  [[menus.main]]
    name = "Links"
    url = "/links/"
    weight = 30

  [[menus.footer]]
    name = "Tags"
    url = "/tags/"
    weight = 5
  [[menus.footer]]
    name = "Archiv"
    url = "/blog/archive/"
    weight = 6
  [[menus.footer]]
    name = "Impressum"
    url = "/legal/"
    weight = 10
  [[menus.footer]]
    name = "Datenschutz"
    url = "/privacy/"
    weight = 20
  [[menus.footer]]
    name = "Lizenzen"
    url = "/licenses/"
    weight = 30
